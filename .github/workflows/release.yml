name: Release

on:
  repository_dispatch:
    types:
      - release

permissions:
  contents: read

concurrency:
  group: release-publication
  cancel-in-progress: false

jobs:
  verify-release-tag:
    runs-on: ubuntu-24.04
    container:
      image: registry.fedoraproject.org/fedora@sha256:bf1977904d73dceee3f693ab77b025b352375a9d06345045ed22b0b1b232b836
    outputs:
      revision: ${{ steps.verify.outputs.revision }}
      sha: ${{ steps.verify.outputs.sha }}
      tag: ${{ steps.verify.outputs.tag }}
    steps:
      - name: Install tag verification tools
        run: dnf --assumeyes --setopt=install_weak_deps=False install git gnupg2 python3
      - name: Check out trusted release workflow branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Verify requested release tag
        id: verify
        env:
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
          RELEASE_TAG_TRUSTED_KEYS: ${{ secrets.RELEASE_TAG_TRUSTED_KEYS }}
        run: |
          test -n "$RELEASE_TAG"
          test -n "$RELEASE_TAG_TRUSTED_KEYS"
          [[ "$RELEASE_TAG" =~ ^release-[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]+$ ]]
          git fetch --force origin \
            "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git cat-file -t "$RELEASE_TAG")" = "tag"
          install -d -m 0700 "$RUNNER_TEMP/tag-verify-gnupg"
          printf '%s\n' "$RELEASE_TAG_TRUSTED_KEYS" > "$RUNNER_TEMP/release-tag-keys.asc"
          gpg --homedir "$RUNNER_TEMP/tag-verify-gnupg" \
            --batch --import "$RUNNER_TEMP/release-tag-keys.asc"
          GNUPGHOME="$RUNNER_TEMP/tag-verify-gnupg" \
            git verify-tag "$RELEASE_TAG"
          tag_commit=$(git rev-list -n1 "$RELEASE_TAG")
          revision=$(
            git show "$tag_commit:manifests/release-set.json" |
              python3 -c 'import json,sys; print(json.load(sys.stdin)["revision"])'
          )
          test "$RELEASE_TAG" = "release-$revision"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "sha=$tag_commit" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: verify-release-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            runner: '["self-hosted","linux","x64","fedora-44","ephemeral"]'
          - architecture: aarch64
            runner: '["self-hosted","linux","ARM64","fedora-44","ephemeral"]'
    runs-on: ${{ fromJSON(matrix.runner) }}
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify-release-tag.outputs.sha }}
          fetch-depth: 0
      - name: Install Fedora build dependencies
        run: sudo ci/install-build-dependencies.sh
      - name: Build release set
        run: make build-set MOCK_CONFIG=mock/fedora-44-${{ matrix.architecture }}.cfg
      - name: Test release installation
        run: ci/install-test.sh mock/fedora-44-${{ matrix.architecture }}.cfg .work/repository
      - name: Archive architecture results
        run: tar --zstd -cf hyprwm-fedora-44-${{ matrix.architecture }}.tar.zst results/fedora-44-${{ matrix.architecture }}
      - name: Upload architecture results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hyprwm-fedora-44-${{ matrix.architecture }}
          path: hyprwm-fedora-44-${{ matrix.architecture }}.tar.zst
          if-no-files-found: error
          retention-days: 90

  publish:
    needs:
      - verify-release-tag
      - build
    runs-on: ${{ fromJSON('["self-hosted","linux","x64","fedora-44","ephemeral"]') }}
    timeout-minutes: 120
    environment: release
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify-release-tag.outputs.sha }}
          fetch-depth: 0
      - name: Install publication dependencies
        run: |
          sudo dnf --assumeyes --setopt=install_weak_deps=False install \
            createrepo_c \
            gh \
            gnupg2 \
            python3 \
            python3-jsonschema \
            rpm-sign \
            zstd
      - name: Download release builds
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: hyprwm-fedora-44-*
          path: artifacts
      - name: Restore architecture results
        run: |
          find artifacts -name '*.tar.zst' -print0 |
            sort -z |
            xargs -0 -n1 tar --zstd -xf
      - name: Import isolated signing key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
          RPM_GPG_PUBLIC_KEY: ${{ secrets.RPM_GPG_PUBLIC_KEY }}
        run: |
          install -d -m 0700 "$RUNNER_TEMP/gnupg"
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          printf '%s\n' "$RPM_GPG_PRIVATE_KEY" > "$RUNNER_TEMP/private-key.asc"
          printf '%s\n' "$RPM_GPG_PUBLIC_KEY" > "$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora"
          gpg --batch --import "$RUNNER_TEMP/private-key.asc"
      - name: Create signed immutable snapshot
        env:
          GNUPGHOME: ${{ runner.temp }}/gnupg
          RPM_GPG_KEY_ID: ${{ secrets.RPM_GPG_KEY_ID }}
          REPOSITORY_BASEURL: ${{ vars.REPOSITORY_BASEURL }}
          REPOSITORY_PUBLISH_ROOT: ${{ vars.REPOSITORY_PUBLISH_ROOT }}
        run: |
          test -n "$REPOSITORY_BASEURL"
          test -n "$REPOSITORY_PUBLISH_ROOT"
          install -d "$REPOSITORY_PUBLISH_ROOT"
          test -w "$REPOSITORY_PUBLISH_ROOT"
          current="$REPOSITORY_PUBLISH_ROOT/fedora/44/current"
          if [[ -L "$current" ]]; then
            readlink -f "$current" > "$RUNNER_TEMP/previous-snapshot"
          else
            : > "$RUNNER_TEMP/previous-snapshot"
          fi
          revision=$(python3 -c 'import json; print(json.load(open("manifests/release-set.json"))["revision"])')
          python3 tooling/hyprwm-packaging snapshot \
            --input results \
            --output "$REPOSITORY_PUBLISH_ROOT" \
            --config-name fedora-44-x86_64 fedora-44-aarch64 \
            --baseurl "$REPOSITORY_BASEURL" \
            --signing-key "$RPM_GPG_KEY_ID" \
            --public-key "$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora" \
            --no-activate
          snapshot_dir="$REPOSITORY_PUBLISH_ROOT/fedora/44/releases/$revision"
          python3 tooling/hyprwm-packaging bundle \
            --input "$snapshot_dir" \
            --output "$GITHUB_WORKSPACE/hyprwm-fedora-44-$revision.tar.zst" \
            --signing-key "$RPM_GPG_KEY_ID" \
            --public-key "$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora"
          cp "$snapshot_dir/hyprwm-fedora.repo" .
          cp "$snapshot_dir/RPM-GPG-KEY-hyprwm-fedora" .
      - name: Test signed repository with DNF
        run: |
          revision=$(python3 -c 'import json; print(json.load(open("manifests/release-set.json"))["revision"])')
          repository="${{ vars.REPOSITORY_PUBLISH_ROOT }}/fedora/44/releases/$revision/x86_64"
          installroot="$RUNNER_TEMP/signed-installroot"
          sudo dnf5 --assumeyes \
            --installroot="$installroot" \
            --releasever=44 \
            --use-host-config \
            --repofrompath="hyprwm,file://$repository" \
            --setopt=hyprwm.pkg_gpgcheck=1 \
            --setopt=hyprwm.repo_gpgcheck=1 \
            --setopt="hyprwm.gpgkey=file://$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora" \
            --setopt=install_weak_deps=False \
            install hyprland
          sudo rpm --root "$installroot" --query hyprland
          previous_snapshot=$(cat "$RUNNER_TEMP/previous-snapshot")
          if [[ -n "$previous_snapshot" ]]; then
            upgraderoot="$RUNNER_TEMP/upgrade-installroot"
            sudo dnf5 --assumeyes \
              --installroot="$upgraderoot" \
              --releasever=44 \
              --use-host-config \
              --repofrompath="hyprwm-old,file://$previous_snapshot/x86_64" \
              --setopt=hyprwm-old.pkg_gpgcheck=1 \
              --setopt=hyprwm-old.repo_gpgcheck=1 \
              --setopt="hyprwm-old.gpgkey=file://$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora" \
              install hyprwm-complete
            sudo dnf5 --assumeyes \
              --installroot="$upgraderoot" \
              --releasever=44 \
              --use-host-config \
              --repofrompath="hyprwm-new,file://$repository" \
              --setopt=hyprwm-new.pkg_gpgcheck=1 \
              --setopt=hyprwm-new.repo_gpgcheck=1 \
              --setopt="hyprwm-new.gpgkey=file://$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora" \
              upgrade
            expected_meta=$(
              rpm -qp --qf '%{VERSION}-%{RELEASE}' \
                "$repository"/Packages/hyprwm-complete-*.rpm
            )
            installed_meta=$(
              sudo rpm --root "$upgraderoot" --query \
                --qf '%{VERSION}-%{RELEASE}' hyprwm-complete
            )
            test "$installed_meta" = "$expected_meta"
            sudo dnf5 \
              --installroot="$upgraderoot" \
              --releasever=44 \
              --use-host-config \
              --repofrompath="hyprwm-new,file://$repository" \
              --setopt=hyprwm-new.pkg_gpgcheck=1 \
              --setopt=hyprwm-new.repo_gpgcheck=1 \
              --setopt="hyprwm-new.gpgkey=file://$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora" \
              check-upgrade
            expected_old_meta=$(
              rpm -qp --qf '%{VERSION}-%{RELEASE}' \
                "$previous_snapshot"/x86_64/Packages/hyprwm-complete-*.rpm
            )
            sudo dnf5 --assumeyes \
              --installroot="$upgraderoot" \
              --releasever=44 \
              --use-host-config \
              --repofrompath="hyprwm-old,file://$previous_snapshot/x86_64" \
              --setopt=hyprwm-old.pkg_gpgcheck=1 \
              --setopt=hyprwm-old.repo_gpgcheck=1 \
              --setopt="hyprwm-old.gpgkey=file://$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora" \
              distro-sync
            installed_old_meta=$(
              sudo rpm --root "$upgraderoot" --query \
                --qf '%{VERSION}-%{RELEASE}' hyprwm-complete
            )
            test "$installed_old_meta" = "$expected_old_meta"
          fi
      - name: Preflight snapshot activation
        env:
          REPOSITORY_PUBLISH_ROOT: ${{ vars.REPOSITORY_PUBLISH_ROOT }}
        run: |
          python3 tooling/hyprwm-packaging activate \
            --output "$REPOSITORY_PUBLISH_ROOT" \
            --public-key "$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora" \
            --check-only
      - name: Upload signed repository
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hyprwm-fedora-signed-repository
          path: |
            hyprwm-fedora-44-*.tar.zst
            hyprwm-fedora-44-*.tar.zst.sha256
            hyprwm-fedora-44-*.tar.zst.sha256.asc
            hyprwm-fedora.repo
            RPM-GPG-KEY-hyprwm-fedora
          if-no-files-found: error
          retention-days: 365
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify-release-tag.outputs.tag }}
        run: |
          assets=(
            hyprwm-fedora-44-*.tar.zst
            hyprwm-fedora-44-*.tar.zst.sha256
            hyprwm-fedora-44-*.tar.zst.sha256.asc
            hyprwm-fedora.repo
            RPM-GPG-KEY-hyprwm-fedora
          )
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --generate-notes \
            "${assets[@]}"
      - name: Activate verified snapshot
        env:
          REPOSITORY_PUBLISH_ROOT: ${{ vars.REPOSITORY_PUBLISH_ROOT }}
        run: |
          python3 tooling/hyprwm-packaging activate \
            --output "$REPOSITORY_PUBLISH_ROOT" \
            --public-key "$RUNNER_TEMP/RPM-GPG-KEY-hyprwm-fedora"

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    container:
      image: registry.fedoraproject.org/fedora@sha256:bf1977904d73dceee3f693ab77b025b352375a9d06345045ed22b0b1b232b836
    steps:
      - name: Install validation tools
        run: dnf --assumeyes --setopt=install_weak_deps=False install git make python3 python3-jsonschema rpm-build
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Validate manifests and specs
        run: |
          make validate
          make test-tooling
          make check-docs
          python3 -m py_compile tooling/hyprwm-packaging
          find packages -name '*.spec' -print0 |
            sort -z |
            xargs -0 -n1 rpmspec -P >/dev/null
          git diff --check

  build-x86_64:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    container:
      image: registry.fedoraproject.org/fedora@sha256:bf1977904d73dceee3f693ab77b025b352375a9d06345045ed22b0b1b232b836
      options: --privileged
    steps:
      - name: Install build tools
        run: |
          dnf --assumeyes --setopt=install_weak_deps=False install git
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Fedora build dependencies
        run: ci/install-build-dependencies.sh
      - name: Build locked package set
        run: make build-set MOCK_CONFIG=mock/fedora-44-x86_64.cfg
      - name: Audit RPMs
        run: python3 tooling/hyprwm-packaging audit --require-complete
      - name: Test DNF installation
        run: ci/install-test.sh mock/fedora-44-x86_64.cfg .work/repository
      - name: Archive unsigned build
        if: always()
        run: |
          tar --zstd -cf hyprwm-fedora-44-x86_64.tar.zst results .work/repository
      - name: Upload unsigned build
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hyprwm-fedora-44-x86_64
          path: hyprwm-fedora-44-x86_64.tar.zst
          if-no-files-found: error
          retention-days: 14
